[package]
name = "bls12_381_verifier"
version = "0.1.0"
edition = "2024"
publish = false
rust-version = "1.89.0"

[lib]
crate-type = ["lib", "cdylib"]
doctest = false

[dependencies]
soroban-sdk = "26"

[dev-dependencies]
soroban-sdk = { version = "26", features = ["testutils"] }
ark-bls12-381 = "0.6"
ark-ff = "0.6"
ark-serialize = "0.6"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
